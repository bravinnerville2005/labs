<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flatbooks - Local Bookstore</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Georgia, serif;
            background: #f5f5dc;
            color: #333;
            line-height: 1.6;
        }

        header {
            background: #8b4513;
            color: #fff8dc;
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .tagline {
            font-style: italic;
            opacity: 0.9;
        }

        main {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-title {
            text-align: center;
            color: #8b4513;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        #book-catalog {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .book-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s;
            border: 2px solid #deb887;
        }

        .book-card:hover {
            transform: translateY(-10px);
        }

        .book-cover {
            height: 200px;
            background: #654321;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f5f5dc;
            font-size: 1.2rem;
            text-align: center;
            padding: 20px;
            position: relative;
        }

        .featured-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ffd700;
            color: #2c1810;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .book-info {
            padding: 20px;
        }

        .book-genre {
            background: #deb887;
            color: #2c1810;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .book-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c1810;
            margin: 10px 0;
        }

        .book-author {
            color: #8b4513;
            font-style: italic;
            margin-bottom: 10px;
        }

        .book-price {
            font-size: 1.3rem;
            color: #228b22;
            font-weight: bold;
        }

        .stock-status {
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .in-stock {
            color: #228b22;
        }

        .out-of-stock {
            color: #dc143c;
        }

        footer {
            background: #2c1810;
            color: #f5f5dc;
            text-align: center;
            padding: 30px;
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <header>
        <h1 id="store-title">Bookstore Template</h1>
        <p class="tagline">Your neighborhood book haven</p>
    </header>

    <main>
        <h2 class="section-title">Our Collection</h2>
        <div id="book-catalog"></div>
    </main>

    <footer>
        <p>&copy; 2024 Flatbooks. All rights reserved.</p>
    </footer>

    <script>
        // Bookstore data object
        const bookstoreData = {
            storeName: "Flatbooks",
            tagline: "Where Every Page Turns into an Adventure",
            books: [
                {
                    id: 1,
                    title: "The Great Gatsby",
                    author: "F. Scott Fitzgerald",
                    genre: "Classic",
                    price: 12.99,
                    inStock: true,
                    featured: true
                },
                {
                    id: 2,
                    title: "To Kill a Mockingbird",
                    author: "Harper Lee",
                    genre: "Fiction",
                    price: 14.50,
                    inStock: true,
                    featured: false
                },
                {
                    id: 3,
                    title: "1984",
                    author: "George Orwell",
                    genre: "Dystopian",
                    price: 11.99,
                    inStock: true,
                    featured: true
                },
                {
                    id: 4,
                    title: "Pride and Prejudice",
                    author: "Jane Austen",
                    genre: "Romance",
                    price: 10.99,
                    inStock: false,
                    featured: false
                },
                {
                    id: 5,
                    title: "The Catcher in the Rye",
                    author: "J.D. Salinger",
                    genre: "Coming-of-age",
                    price: 13.25,
                    inStock: true,
                    featured: false
                },
                {
                    id: 6,
                    title: "Brave New World",
                    author: "Aldous Huxley",
                    genre: "Dystopian",
                    price: 12.50,
                    inStock: true,
                    featured: true
                }
            ]
        };

        // Update store title and tagline
        function updateStoreInfo() {
            const titleElement = document.getElementById('store-title');
            const taglineElement = document.querySelector('.tagline');
            
            titleElement.textContent = bookstoreData.storeName;
            taglineElement.textContent = bookstoreData.tagline;
            document.title = bookstoreData.storeName;
        }

        // Create book card element
        function createBookCard(book) {
            const card = document.createElement('div');
            card.className = 'book-card';
            
            const stockStatus = book.inStock ? 'in-stock' : 'out-of-stock';
            const stockText = book.inStock ? 'In Stock' : 'Out of Stock';
            
            let coverHtml = `<div class="book-cover"><div>${book.title}</div></div>`;
            
            if (book.featured) {
                coverHtml = `<div class="book-cover"><span class="featured-badge">Featured</span><div>${book.title}</div></div>`;
            }
            
            card.innerHTML = `
                ${coverHtml}
                <div class="book-info">
                    <span class="book-genre">${book.genre}</span>
                    <h3 class="book-title">${book.title}</h3>
                    <p class="book-author">by ${book.author}</p>
                    <div class="book-price">$${book.price.toFixed(2)}</div>
                    <div class="stock-status ${stockStatus}">${stockText}</div>
                </div>
            `;
            
            return card;
        }

        // Render all books to the catalog
        function renderCatalog() {
            const catalog = document.getElementById('book-catalog');
            
            for (let i = 0; i < bookstoreData.books.length; i++) {
                const book = bookstoreData.books[i];
                const card = createBookCard(book);
                catalog.appendChild(card);
            }
        }

        // Initialize when DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
            updateStoreInfo();
            renderCatalog();
        });
    </script>
</body>
</html>
